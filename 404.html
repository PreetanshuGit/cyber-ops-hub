<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preetanshu Gupta · ParallaX — Cybersecurity Portfolio</title>
    <script>
      // GitHub Pages SPA redirect
      // Encode the full path as a query param and redirect to index.html
      // so React Router can handle it on load.
      var segmentCount = 1; // number of path segments in the base URL (/cyber-ops-hub/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
